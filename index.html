<style>
  :root{
    --bg:#07040f;
    --bg2:#0d0820;
    --panel:#120b28;
    --panel-line: rgba(155,92,255,0.18);
    --purple:#9b3bff;
    --purple-bright:#b96bff;
    --cyan:#28f0e0;
    --red:#ff3b5c;
    --green:#2be08a;
    --amber:#ffb020;
    --text:#eae5ff;
    --text-dim:#9c93bf;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(circle at 15% 0%, rgba(155,59,255,0.16), transparent 45%),
      radial-gradient(circle at 85% 20%, rgba(40,240,224,0.10), transparent 40%),
      var(--bg);
    background-size:200% 200%;
    animation:bgDrift 22s ease-in-out infinite;
    color:var(--text);
    font-family:'Tajawal', sans-serif;
    min-height:100vh;
    overflow-x:hidden;
    transition: background-color .5s ease;
  }
  @keyframes bgDrift{
    0%{background-position:0% 0%, 100% 0%, 0 0;}
    50%{background-position:20% 30%, 70% 40%, 0 0;}
    100%{background-position:0% 0%, 100% 0%, 0 0;}
  }
  #matrixRain{position:fixed; inset:0; z-index:0; opacity:0.14; pointer-events:none;}
  .bg-wordmark{
    position:fixed; inset:0; z-index:0; pointer-events:none;
    display:flex; align-items:center; justify-content:center; overflow:hidden;
  }
  .bg-wordmark span{
    font-family:'Orbitron',sans-serif; font-weight:900;
    font-size:clamp(70px, 20vw, 260px); letter-spacing:10px;
    background:linear-gradient(120deg, rgba(155,59,255,0.16) 0%, rgba(40,240,224,0.32) 45%, rgba(155,59,255,0.16) 100%);
    background-size:220% 220%;
    -webkit-background-clip:text; background-clip:text; color:transparent;
    animation: wordmarkShimmer 9s ease-in-out infinite, wordmarkBreathe 6s ease-in-out infinite;
    user-select:none; white-space:nowrap;
  }
  @keyframes wordmarkShimmer{
    0%,100%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
  }
  @keyframes wordmarkBreathe{
    0%,100%{opacity:0.55; transform:scale(1);}
    50%{opacity:0.85; transform:scale(1.035);}
  }
  .scanlines{
    position:fixed; inset:0; pointer-events:none; z-index:1;
    background:repeating-linear-gradient(0deg, rgba(255,255,255,0.012) 0px, rgba(255,255,255,0.012) 1px, transparent 1px, transparent 3px);
  }
  .vignette{position:fixed; inset:0; pointer-events:none; z-index:1; box-shadow: inset 0 0 160px rgba(0,0,0,0.75);}
  .wrap{position:relative; z-index:2; max-width:1180px; margin:0 auto; padding:20px 16px 60px;}

  /* header */
  header{display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:26px; flex-wrap:wrap;}
  .brand{display:flex; align-items:center; gap:12px;}
  .brand-mark{
    width:44px;height:44px; border-radius:12px;
    background:linear-gradient(135deg, var(--purple), var(--cyan));
    background-size:200% 200%;
    animation:markShift 4s ease-in-out infinite;
    display:flex;align-items:center;justify-content:center;
    font-family:'Orbitron',sans-serif; font-weight:900; color:#050310; font-size:20px;
    box-shadow:0 0 22px rgba(155,59,255,0.55), 0 0 40px rgba(40,240,224,0.25);
  }
  @keyframes markShift{
    0%,100%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
  }
  .brand h1{
    font-family:'Orbitron',sans-serif; font-size:20px; letter-spacing:1px; margin:0; color:#fff;
    animation:titleGlow 3s ease-in-out infinite;
  }
  @keyframes titleGlow{
    0%,100%{text-shadow:0 0 14px rgba(155,59,255,0.45), 0 0 2px #fff;}
    50%{text-shadow:0 0 26px rgba(155,59,255,0.85), 0 0 10px rgba(40,240,224,0.4);}
  }
  .brand span.sub{display:block; font-size:11px; color:var(--text-dim); font-family:'Tajawal',sans-serif; letter-spacing:1px; margin-top:2px;}
  .head-actions{display:flex; gap:10px; align-items:center; flex-wrap:wrap;}

  .btn{
    border:1px solid var(--panel-line); background:rgba(155,59,255,0.08); color:var(--text);
    padding:9px 16px; border-radius:9px; font-family:'Tajawal',sans-serif; font-weight:700; font-size:14px;
    cursor:pointer; transition:.15s ease; white-space:nowrap; position:relative; overflow:hidden;
  }
  .btn:active{transform:scale(0.96);}
  .btn:hover{background:rgba(155,59,255,0.18); border-color:var(--purple); box-shadow:0 0 14px rgba(155,59,255,0.35);}
  .btn.primary{background:linear-gradient(135deg, var(--purple), #7a1fe0); background-size:200% 200%; border:none; box-shadow:0 0 16px rgba(155,59,255,0.4); animation:primaryShift 3s ease-in-out infinite;}
  @keyframes primaryShift{0%,100%{background-position:0% 50%;} 50%{background-position:100% 50%;}}
  .btn.primary:hover{filter:brightness(1.12); box-shadow:0 0 24px rgba(155,59,255,0.65);}
  .btn.ghost{background:transparent;}
  .btn.danger{background:rgba(255,59,92,0.12); border-color:rgba(255,59,92,0.4); color:#ffb0bf;}
  .btn.danger:hover{background:rgba(255,59,92,0.22);}
  .btn.small{padding:6px 12px; font-size:12.5px; border-radius:7px;}
  .btn:disabled{opacity:.4; cursor:not-allowed;}

  .pill{
    font-size:11px; padding:4px 10px; border-radius:20px; font-weight:700; letter-spacing:.3px;
    display:inline-flex; align-items:center; gap:5px;
  }
  .pill.admin{background:rgba(43,224,138,0.15); color:var(--green); border:1px solid rgba(43,224,138,0.35);}
  .pill.viewer{background:rgba(156,147,191,0.12); color:var(--text-dim); border:1px solid var(--panel-line);}

  /* grid */
  .section-title{display:flex; align-items:baseline; gap:10px; margin:28px 0 14px;}
  .section-title h2{font-family:'Orbitron',sans-serif; font-size:15px; color:var(--cyan); letter-spacing:1px; margin:0;}
  .section-title .line{flex:1; height:1px; background:linear-gradient(90deg, var(--panel-line), transparent);}

  .grid{display:grid; grid-template-columns:repeat(auto-fill, minmax(210px,1fr)); gap:14px;}

  .card{
    background:linear-gradient(180deg, var(--panel), rgba(18,11,40,0.6));
    border:1px solid var(--panel-line); border-radius:14px; padding:16px;
    cursor:pointer; position:relative; overflow:hidden; transition:.2s ease;
    min-height:150px; display:flex; flex-direction:column; justify-content:space-between;
  }
  .card::before{
    content:''; position:absolute; inset:0; border-radius:14px; padding:1px;
    background:linear-gradient(135deg, transparent, transparent);
    opacity:0; transition:.2s ease; pointer-events:none;
  }
  .card:hover{transform:translateY(-4px); border-color:var(--purple); box-shadow:0 10px 30px rgba(155,59,255,0.25), 0 0 0 1px rgba(155,59,255,0.15);}
  .card.free{box-shadow:inset 0 0 0 1px rgba(43,224,138,0.15);}
  .card.busy{box-shadow:inset 0 0 0 1px rgba(255,59,92,0.2);}
  .card.busy.overdue{animation:pulseRed 1.4s infinite; border-color:var(--red);}
  .card.room{background:linear-gradient(180deg, rgba(255,176,32,0.08), rgba(18,11,40,0.6));}
  @keyframes pulseRed{
    0%,100%{box-shadow:0 0 0 rgba(255,59,92,0);}
    50%{box-shadow:0 0 22px rgba(255,59,92,0.55);}
  }
  .card-top{display:flex; justify-content:space-between; align-items:flex-start;}
  .device-name{font-family:'Orbitron',sans-serif; font-size:15px; color:#fff;}
  .device-tag{font-size:10.5px; color:var(--amber); margin-top:3px; display:block;}
  .dot{width:9px;height:9px;border-radius:50%; margin-top:4px; flex-shrink:0;}
  .dot.free{background:var(--green); box-shadow:0 0 8px var(--green);}
  .dot.busy{background:var(--red); box-shadow:0 0 8px var(--red);}
  .card-status{font-size:12.5px; color:var(--text-dim); margin-top:10px;}
  .card-timer{font-family:'Orbitron',sans-serif; font-size:22px; color:var(--cyan); margin-top:4px; letter-spacing:1px;}
  .card-cost{font-size:12px; color:var(--text-dim); margin-top:2px;}
  .card-mode{font-size:11px; color:var(--purple-bright); margin-top:4px; font-weight:700;}

  /* modal */
  .overlay{position:fixed; inset:0; background:rgba(4,2,12,0.72); backdrop-filter:blur(3px); display:flex; align-items:center; justify-content:center; z-index:50; padding:16px;}
  .modal{
    background:linear-gradient(180deg,#150c30,#0d0820); border:1px solid var(--panel-line); border-radius:16px;
    width:100%; max-width:420px; padding:22px; max-height:88vh; overflow-y:auto;
    box-shadow:0 20px 60px rgba(0,0,0,0.6);
  }
  .modal h3{font-family:'Orbitron',sans-serif; font-size:16px; margin:0 0 16px; color:#fff;}
  .modal.wide{max-width:640px;}
  .field{margin-bottom:14px;}
  .field label{display:block; font-size:12.5px; color:var(--text-dim); margin-bottom:6px; font-weight:700;}
  .field input, .field select{
    width:100%; background:rgba(255,255,255,0.04); border:1px solid var(--panel-line); color:#fff;
    padding:10px 12px; border-radius:9px; font-family:'Tajawal',sans-serif; font-size:14px; outline:none;
  }
  .field input:focus, .field select:focus{border-color:var(--purple);}
  .seg{display:flex; gap:8px;}
  .seg button{flex:1; padding:9px; border-radius:9px; border:1px solid var(--panel-line); background:rgba(255,255,255,0.03); color:var(--text-dim); font-weight:700; cursor:pointer; font-family:'Tajawal',sans-serif; font-size:13px;}
  .seg button.active{background:rgba(155,59,255,0.22); border-color:var(--purple); color:#fff;}
  .modal-actions{display:flex; gap:10px; margin-top:18px;}
  .modal-actions .btn{flex:1;}
  .close-x{position:absolute; top:14px; left:14px; background:none; border:none; color:var(--text-dim); font-size:20px; cursor:pointer;}
  .modal{position:relative;}
  .hint{font-size:11.5px; color:var(--text-dim); margin-top:-8px; margin-bottom:14px;}
  .error{color:var(--red); font-size:12.5px; margin-top:-6px; margin-bottom:10px;}

  .info-row{display:flex; justify-content:space-between; padding:9px 0; border-bottom:1px dashed var(--panel-line); font-size:13.5px;}
  .info-row b{color:#fff;}
  .live-box{text-align:center; background:rgba(155,59,255,0.08); border:1px solid var(--panel-line); border-radius:12px; padding:16px; margin-bottom:16px;}
  .live-box .t{font-family:'Orbitron',sans-serif; font-size:30px; color:var(--cyan); letter-spacing:1px;}
  .live-box .c{font-size:13px; color:var(--text-dim); margin-top:4px;}
  .live-box .c b{color:var(--green);}

  table{width:100%; border-collapse:collapse; font-size:12.5px;}
  th,td{padding:8px 6px; text-align:right; border-bottom:1px solid var(--panel-line);}
  th{color:var(--text-dim); font-size:11px; font-weight:700;}
  tbody tr:hover{background:rgba(255,255,255,0.02);}
  .empty{text-align:center; color:var(--text-dim); padding:30px 10px; font-size:13px;}

  .toast-wrap{position:fixed; top:16px; left:50%; transform:translateX(-50%); z-index:80; display:flex; flex-direction:column; gap:8px; width:min(360px,92vw);}
  .toast{background:linear-gradient(135deg, rgba(255,59,92,0.95), rgba(155,59,255,0.9)); color:#fff; padding:12px 16px; border-radius:10px; font-size:13.5px; font-weight:700; box-shadow:0 8px 24px rgba(0,0,0,0.4); animation:slideDown .25s ease;}
  @keyframes slideDown{from{opacity:0; transform:translateY(-12px);} to{opacity:1; transform:translateY(0);}}

  #installBar{margin-top:12px;}
  .install-banner{
    display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap;
    background:linear-gradient(135deg, rgba(155,59,255,0.14), rgba(40,240,224,0.08));
    border:1px solid var(--panel-line); border-radius:12px; padding:12px 16px;
  }
  .install-banner span{font-size:13.5px; color:var(--text);}
  .install-banner b{color:var(--cyan);}

  footer{margin-top:50px; text-align:center; padding-top:20px; border-top:1px solid var(--panel-line); color:var(--text-dim); font-size:13px;}
  footer a{color:var(--cyan); text-decoration:none; font-weight:700;}
  footer a:hover{text-decoration:underline;}

  .price-grid{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
  .theme-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:6px;}
  .theme-swatch{
    border-radius:12px; padding:14px 10px; text-align:center; cursor:pointer; border:2px solid transparent;
    font-family:'Tajawal',sans-serif; font-weight:700; font-size:13px; color:#fff; transition:.15s ease;
  }
  .theme-swatch:hover{ transform:translateY(-2px); }
  .theme-swatch.active{ border-color:#fff; box-shadow:0 0 16px rgba(255,255,255,0.35); }
  .settings-section{ margin-bottom:20px; }
  .settings-section h4{ font-family:'Orbitron',sans-serif; font-size:13px; color:var(--cyan); margin:0 0 10px; letter-spacing:.5px; }
  @media (max-width:480px){
    .brand h1{font-size:16px;}
    .live-box .t{font-size:24px;}
  }
</style>

<script>
/* ===================== ALERT SYSTEM: sound + browser notification ===================== */
let audioCtx = null;
function unlockAudio(){
  if(!audioCtx){
    try{ audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }catch(e){}
  }else if(audioCtx.state === 'suspended'){
    audioCtx.resume();
  }
}
document.addEventListener('click', unlockAudio, {once:false});

function tone(freq, startTime, duration, type, peakGain){
  if(!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, startTime);
  gain.gain.setValueAtTime(0.0001, startTime);
  gain.gain.exponentialRampToValueAtTime(peakGain, startTime+0.02);
  gain.gain.exponentialRampToValueAtTime(0.0001, startTime+duration);
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.start(startTime); osc.stop(startTime+duration+0.02);
}
function playAlarmSound(){
  unlockAudio();
  if(!audioCtx) return;
  const t = audioCtx.currentTime;
  // energetic rising 3-note "alert" fanfare + punchy sub thump, gaming-arcade style
  tone(220, t, 0.12, 'sawtooth', 0.35);
  tone(523.25, t+0.02, 0.16, 'square', 0.25);
  tone(659.25, t+0.20, 0.16, 'square', 0.28);
  tone(880.00, t+0.40, 0.30, 'square', 0.32);
  tone(110, t+0.02, 0.35, 'sine', 0.4);
}

function requestNotifPermission(){
  if('Notification' in window && Notification.permission === 'default'){
    Notification.requestPermission();
  }
}
function showDeviceNotification(deviceName){
  if('Notification' in window && Notification.permission === 'granted'){
    try{
      const n = new Notification('⏰ Matrix Gaming — انتهى الوقت!', {
        body: `${deviceName} خلص وقته المحدد — روح اقفله أو زوّد وقت`,
        tag: 'matrix-overdue-'+deviceName,
        requireInteraction: true
      });
      n.onclick = ()=>{ window.focus(); n.close(); };
    }catch(e){}
  }
}
function fireOverdueAlert(deviceName){
  pushToast(`⏰ ${deviceName} — انتهى الوقت المحدد!`);
  playAlarmSound();
  showDeviceNotification(deviceName);
}

/* ===================== MATRIX RAIN BACKGROUND ===================== */
(function matrixRain(){
  const canvas = document.getElementById('matrixRain');
  const ctx = canvas.getContext('2d');
  let w, h, cols, drops;
  const chars = "01ﾊﾐﾋｰｳｼﾅﾓﾆｻﾜﾂｵﾘｱﾎﾃﾏｹﾒｴｶｷﾑﾕﾗｾﾈｽﾀﾇﾍPS◆●▲";
  function resize(){
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
    const fontSize = 16;
    cols = Math.floor(w/fontSize);
    drops = new Array(cols).fill(0).map(()=>Math.random()*-40);
  }
  window.addEventListener('resize', resize);
  resize();
  function draw(){
    ctx.fillStyle = 'rgba(5,2,12,0.09)';
    ctx.fillRect(0,0,w,h);
    const fontSize=16;
    ctx.font = fontSize+"px monospace";
    for(let i=0;i<cols;i++){
      const text = chars[Math.floor(Math.random()*chars.length)];
      const grad = Math.random()>0.85 ? '#28f0e0' : '#9b3bff';
      ctx.fillStyle = grad;
      ctx.fillText(text, i*fontSize, drops[i]*fontSize);
      if(drops[i]*fontSize > h && Math.random()>0.975) drops[i]=0;
      drops[i]++;
    }
  }
  setInterval(draw, 55);
})();

/* ===================== PWA: SERVICE WORKER + INSTALL PROMPT ===================== */
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}
let deferredInstallPrompt = null;
window.addEventListener('beforeinstallprompt', (e)=>{
  e.preventDefault();
  deferredInstallPrompt = e;
  showInstallBanner();
});
window.addEventListener('appinstalled', ()=>{
  deferredInstallPrompt = null;
  document.getElementById('installBar').innerHTML = '';
});
function showInstallBanner(){
  document.getElementById('installBar').innerHTML = `
    <div class="install-banner">
      <span>ثبّت <b>Matrix Gaming</b> كتطبيق على جهازك، يفتح زي أي برنامج عادي من غير متصفح</span>
      <button class="btn primary small" id="installBtn">تثبيت التطبيق</button>
    </div>
  `;
  document.getElementById('installBtn').onclick = async ()=>{
    if(!deferredInstallPrompt) return;
    deferredInstallPrompt.prompt();
    await deferredInstallPrompt.userChoice;
    deferredInstallPrompt = null;
    document.getElementById('installBar').innerHTML = '';
  };
}

/* ===================== THEMES ===================== */
const THEMES = {
  purple:{ label:'نيون بنفسجي', bg:'#07040f', bg2:'#0d0820', panel:'#120b28', panelLine:'rgba(155,92,255,0.18)', purple:'#9b3bff', purpleBright:'#b96bff', cyan:'#28f0e0' },
  fire:  { label:'نار حمراء',   bg:'#0f0402', bg2:'#1a0805', panel:'#2a0d08', panelLine:'rgba(255,120,60,0.24)', purple:'#ff5b1f', purpleBright:'#ff8a4c', cyan:'#ffd23f' },
  matrix:{ label:'ماتركس أخضر', bg:'#020a04', bg2:'#03140a', panel:'#062010', panelLine:'rgba(50,255,120,0.22)', purple:'#22ff66', purpleBright:'#7bff9e', cyan:'#a8ff32' },
  royal: { label:'ملكي أزرق',   bg:'#02050f', bg2:'#040a1e', panel:'#0a1330', panelLine:'rgba(90,150,255,0.22)', purple:'#3b6bff', purpleBright:'#6f93ff', cyan:'#ffd76b' }
};
function themeTransitionFlash(color){
  const flash = document.createElement('div');
  flash.style.cssText = `position:fixed;inset:0;z-index:9999;background:radial-gradient(circle at 50% 50%, ${color}, transparent 70%);opacity:0;pointer-events:none;transition:opacity .28s ease;`;
  document.body.appendChild(flash);
  requestAnimationFrame(()=>{
    flash.style.opacity='0.6';
    setTimeout(()=>{ flash.style.opacity='0'; setTimeout(()=>flash.remove(), 320); }, 160);
  });
}
function applyTheme(key, withFlash){
  const t = THEMES[key] || THEMES.purple;
  const root = document.documentElement.style;
  root.setProperty('--bg', t.bg);
  root.setProperty('--bg2', t.bg2);
  root.setProperty('--panel', t.panel);
  root.setProperty('--panel-line', t.panelLine);
  root.setProperty('--purple', t.purple);
  root.setProperty('--purple-bright', t.purpleBright);
  root.setProperty('--cyan', t.cyan);
  try{ localStorage.setItem('matrix-theme', key); }catch(e){}

/* ===================== UTIL ===================== */
function fmtHM(ms){
  if(ms < 0) ms = 0;
  const totalMin = Math.floor(ms/60000);
  const h = Math.floor(totalMin/60);
  const m = totalMin%60;
  return (h>0? h+"س ":"") + m + "د";
}
function fmtClock(ms){
  if(ms < 0) ms = 0;
  const totalSec = Math.floor(ms/1000);
  const h = String(Math.floor(totalSec/3600)).padStart(2,'0');
  const m = String(Math.floor((totalSec%3600)/60)).padStart(2,'0');
  const s = String(totalSec%60).padStart(2,'0');
  return h+":"+m+":"+s;
}
function rate(deviceType, mode){ return mode==='multi' ? prices[deviceType].multi : prices[deviceType].single; }
function calcCost(deviceType, mode, ms){
  const hours = ms/3600000;
  return Math.round(hours * rate(deviceType, mode));
}
function nowISO(){ return new Date().toISOString(); }
let serverTimeOffset = 0;
function nowMs(){ return Date.now() + serverTimeOffset; }
async function syncServerTime(){
  try{
    const ref = db.collection('matrixCenter').doc('_timesync');
    const t0 = Date.now();
    await ref.set({ts: firebase.firestore.FieldValue.serverTimestamp()});
    const snap = await ref.get();
    const t1 = Date.now();
    const serverMillis = snap.data().ts.toMillis();
    serverTimeOffset = serverMillis - (t0 + (t1-t0)/2);
  }catch(e){ serverTimeOffset = 0; }
}
function toLocalInputValue(d){
  const pad = n=>String(n).padStart(2,'0');
  return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())+'T'+pad(d.getHours())+':'+pad(d.getMinutes());
}
function pushToast(msg){
  const id = Date.now()+Math.random();
  toasts.push({id,msg});
  renderToasts();
  setTimeout(()=>{ toasts = toasts.filter(t=>t.id!==id); renderToasts(); }, 6000);
}
function renderToasts(){
  const wrap = document.getElementById('toastWrap');
  wrap.innerHTML = toasts.map(t=>`<div class="toast">⚠ ${t.msg}</div>`).join('');
}

/* ===================== TICK / ALERTS ===================== */
function tick(){
  const now = nowMs();
  let changed = false;
  DEVICE_DEFS.forEach(dv=>{
    const dev = devices[dv.id];
    if(dev && dev.session && dev.session.durationHours && !dev.session.open){
      const start = new Date(dev.session.startTime).getTime();
      const end = start + dev.session.durationHours*3600000;
      if(now >= end){
        const last = dev.session.lastAlertAt || 0;
        if(!dev.session.notified || (now - last > 25000)){
          dev.session.notified = true;
          dev.session.lastAlertAt = now;
          changed = true;
          fireOverdueAlert(dv.name);
        }
      }
    }
  });
  if(changed) saveDevices();

  let resChanged = false;
  reservations.forEach(r=>{
    if(r.status==='active'){
      const resTime = new Date(r.reservedTime).getTime();
      if(now > resTime + 5*60000){
        r.status = 'expired';
        resChanged = true;
        pushToast(`⌛ حجز ${r.customerName} على ${r.deviceName} اتلغى تلقائيًا (تأخر أكتر من 5 دقايق)`);
      }
    }
  });
  if(resChanged) saveReservations();

  renderGrid();
  if(document.getElementById('sessionModalTimer')) updateSessionModalTimer();
}

/* ===================== RENDER: GRID ===================== */
function renderGrid(){
  const grid = document.getElementById('deviceGrid');
  const now = nowMs();
  grid.innerHTML = DEVICE_DEFS.map(dv=>{
    const dev = devices[dv.id] || {session:null};
    const s = dev.session;
    const isRoom = dv.type==='room';
    let cls = 'card ' + (s? 'busy':'free') + (isRoom?' room':'');
    let overdue = false;
    let statusHtml = '';
    if(s){
      const start = new Date(s.startTime).getTime();
      const elapsed = now - start;
      if(s.open){
        statusHtml = `
          <div class="card-status">شغّال — مفتوح</div>
          <div class="card-timer">${fmtClock(elapsed)}</div>
          <div class="card-cost">تقريبًا ${calcCost(dv.type, s.mode, elapsed)} ج.م</div>
          <div class="card-mode">${s.mode==='multi'?'زوجي':'فردي'}</div>
        `;
      }else{
        const end = start + s.durationHours*3600000;
        const remaining = end - now;
        overdue = remaining <= 0;
        statusHtml = `
          <div class="card-status">${overdue? 'انتهى الوقت!':'متبقي'}</div>
          <div class="card-timer" style="${overdue?'color:var(--red)':''}">${overdue? '+'+fmtClock(now-end) : fmtClock(remaining)}</div>
          <div class="card-cost">${calcCost(dv.type, s.mode, elapsed)} ج.م حتى الآن</div>
          <div class="card-mode">${s.mode==='multi'?'زوجي':'فردي'}</div>
        `;
      }
      if(overdue) cls += ' overdue';
    }else{
      statusHtml = `<div class="card-status">متاح</div>
        <div class="card-cost" style="margin-top:8px;">${prices[dv.type].single} / ${prices[dv.type].multi} ج.م ساعة</div>`;
    }
    const upcoming = reservations
      .filter(r=>r.deviceId===dv.id && r.status==='active')
      .sort((a,b)=> new Date(a.reservedTime)-new Date(b.reservedTime))[0];
    const resHtml = upcoming ? `<div class="card-mode" style="color:var(--amber);">📅 محجوز ${new Date(upcoming.reservedTime).toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'})} — ${upcoming.customerName}</div>` : '';
    return `
      <div class="${cls}" data-id="${dv.id}">
        <div class="card-top">
          <div>
            <div class="device-name">${dv.name}</div>
            ${isRoom? '<span class="device-tag">VIP ROOM</span>':''}
          </div>
          <div class="dot ${s?'busy':'free'}"></div>
        </div>
        ${statusHtml}
        ${resHtml}
      </div>
    `;
  }).join('');
  grid.querySelectorAll('.card').forEach(card=>{
    card.onclick = ()=> openDeviceModal(card.getAttribute('data-id'));
  });
}

      showModal(`
        <button class="close-x" id="mClose">✕</button>
        <h3>${dv.name}</h3>
        <div class="card-status" style="margin-bottom:6px;">الجهاز متاح الآن</div>
        <div class="info-row"><span>سعر الفردي</span><b>${prices[dv.type].single} ج.م/ساعة</b></div>
        <div class="info-row"><span>سعر الزوجي</span><b>${prices[dv.type].multi} ج.م/ساعة</b></div>
      `);
      document.getElementById('mClose').onclick = closeModal;
      return;
    }
    const nowVal = toLocalInputValue(new Date());
    showModal(`
      <button class="close-x" id="mClose">✕</button>
      <h3>بدء جلسة — ${dv.name}</h3>
      <div class="field">
        <label>وقت البداية</label>
        <div class="seg" style="margin-bottom:8px;">
          <button type="button" class="active" id="segNow">دلوقتي (Default)</button>
          <button type="button" id="segCustom">وقت محدد</button>
        </div>
        <input type="datetime-local" id="startTime" value="${nowVal}" disabled>
      </div>
      <div class="field">
        <label>نوع اللعب</label>
        <div class="seg">
          <button type="button" class="active" id="modeSingle">فردي (${prices[dv.type].single} ج.م)</button>
          <button type="button" id="modeMulti">زوجي (${prices[dv.type].multi} ج.م)</button>
        </div>
      </div>
      <div class="field">
        <label>المدة</label>
        <div class="seg" style="margin-bottom:8px;">
          <button type="button" class="active" id="durFixed">عدد ساعات</button>
          <button type="button" id="durOpen">Open (مفتوح)</button>
        </div>
        <input type="number" id="durHours" min="0.5" step="0.5" value="1" placeholder="عدد الساعات">
      </div>
      <div class="modal-actions">
        <button class="btn primary" id="startBtn">بدء الجلسة</button>
      </div>
    `);
    document.getElementById('mClose').onclick = closeModal;
    let startMode = 'now', mode='single', durMode='fixed';
    document.getElementById('segNow').onclick = (e)=>{ startMode='now'; setActive(e.target,['segNow','segCustom']); document.getElementById('startTime').disabled=true; document.getElementById('startTime').value=toLocalInputValue(new Date()); };
    document.getElementById('segCustom').onclick = (e)=>{ startMode='custom'; setActive(e.target,['segNow','segCustom']); document.getElementById('startTime').disabled=false; };
    document.getElementById('modeSingle').onclick = (e)=>{ mode='single'; setActive(e.target,['modeSingle','modeMulti']); };
    document.getElementById('modeMulti').onclick = (e)=>{ mode='multi'; setActive(e.target,['modeSingle','modeMulti']); };
    document.getElementById('durFixed').onclick = (e)=>{ durMode='fixed'; setActive(e.target,['durFixed','durOpen']); document.getElementById('durHours').disabled=false; };
    document.getElementById('durOpen').onclick = (e)=>{ durMode='open'; setActive(e.target,['durFixed','durOpen']); document.getElementById('durHours').disabled=true; };

    document.getElementById('startBtn').onclick = async ()=>{
      const startTimeVal = startMode==='now' ? new Date().toISOString() : new Date(document.getElementById('startTime').value).toISOString();
      const durHours = durMode==='fixed' ? parseFloat(document.getElementById('durHours').value||'1') : null;
      devices[id].session = {
        startTime: startTimeVal,
        mode: mode,
        open: durMode==='open',
        durationHours: durMode==='fixed' ? durHours : null,
        notified: false
      };
      await saveDevices();
      closeModal();
      renderGrid();
      pushToast(`تم تشغيل ${dv.name}`);
    };
    return;
  }

  // BUSY device
  const s = dev.session;
  const start = new Date(s.startTime).getTime();
  const elapsedNow = nowMs()-start;
  if(!isAdmin){
    showModal(`
      <button class="close-x" id="mClose">✕</button>
      <h3>${dv.name}</h3>
      <div class="live-box">
        <div class="t" id="sessionModalTimer">${fmtClock(elapsedNow)}</div>
        <div class="c" id="sessionModalCost">الحساب حتى الآن: <b>${calcCost(dv.type,s.mode,elapsedNow)} ج.م</b></div>
      </div>
      <div class="info-row"><span>بدأ الساعة</span><b>${new Date(s.startTime).toLocaleTimeString('ar-EG')}</b></div>
      <div class="info-row"><span>نوع اللعب</span><b>${s.mode==='multi'?'زوجي':'فردي'}</b></div>
      <div class="info-row"><span>المدة</span><b>${s.open?'مفتوح':fmtHM(s.durationHours*3600000)}</b></div>
    `);
    document.getElementById('mClose').onclick = closeModal;
    return;
  }
  showModal(`
    <button class="close-x" id="mClose">✕</button>
    <h3>${dv.name} — جلسة شغّالة</h3>
    <div class="live-box">
      <div class="t" id="sessionModalTimer">${fmtClock(elapsedNow)}</div>
      <div class="c" id="sessionModalCost">الحساب حتى الآن: <b>${calcCost(dv.type,s.mode,elapsedNow)} ج.م</b></div>
    </div>
    <div class="info-row"><span>بدأ الساعة</span><b>${new Date(s.startTime).toLocaleTimeString('ar-EG')}</b></div>
    <div class="info-row"><span>نوع اللعب</span><b>${s.mode==='multi'?'زوجي':'فردي'}</b></div>
    <div class="info-row"><span>المدة</span><b>${s.open?'مفتوح (Open)':fmtHM(s.durationHours*3600000)}</b></div>
    ${!s.open?`
    <div class="field" style="margin-top:14px;">
      <label>إضافة وقت (ساعات)</label>
      <div style="display:flex; gap:8px;">
        <input type="number" id="addHoursInput" min="0.25" step="0.25" value="1" style="flex:1;">
        <button class="btn" id="addTimeBtn">إضافة</button>
      </div>
    </div>`:''}
    <div class="modal-actions">
      <button class="btn danger" id="endBtn">إنهاء الجلسة والحساب</button>
    </div>
  `);
  document.getElementById('mClose').onclick = closeModal;
  if(!s.open){
    document.getElementById('addTimeBtn').onclick = async ()=>{
      const add = parseFloat(document.getElementById('addHoursInput').value||'0');
      if(add>0){
        devices[id].session.durationHours += add;
        devices[id].session.notified = false;
        await saveDevices();
        closeModal();
        renderGrid();
        pushToast(`تم إضافة ${add} ساعة لـ ${dv.name}`);
      }
    };
  }
  document.getElementById('endBtn').onclick = async ()=>{
    const endTime = nowMs();
    const elapsed = endTime-start;
    const cost = calcCost(dv.type, s.mode, elapsed);
    history.unshift({
      id: Date.now()+'-'+id,
      deviceId: id,
      deviceName: dv.name,
      startTime: s.startTime,
      endTime: new Date(endTime).toISOString(),
      mode: s.mode,
      hours: (elapsed/3600000).toFixed(2),
      cost: cost
    });
    devices[id].session = null;
    await saveDevices();
    await saveHistory();
    closeModal();
    renderGrid();
    pushToast(`تم إنهاء ${dv.name} — الحساب ${cost} ج.م`);
  };
}

function setActive(target, ids){
  ids.forEach(i=>document.getElementById(i).classList.remove('active'));
  target.classList.add('active');
}

/* ===================== HISTORY MODAL ===================== */
let _chartByDevice = null, _chartTrend = null;
function renderHistoryCharts(){
  if(typeof Chart === 'undefined') return;
  const byDeviceEl = document.getElementById('chartByDevice');
  const trendEl = document.getElementById('chartTrend');
  if(!byDeviceEl || !trendEl) return;

  const byDevice = {};
  DEVICE_DEFS.forEach(dv=>{ byDevice[dv.name] = 0; });
  history.forEach(h=>{ byDevice[h.deviceName] = (byDevice[h.deviceName]||0) + h.cost; });

  const days = [];
  const dayTotals = [];
  for(let i=6;i>=0;i--){
    const d = new Date(nowMs() - i*86400000);
    const key = d.toDateString();
    days.push(d.toLocaleDateString('ar-EG',{weekday:'short'}));
    const total = history.filter(h=> new Date(h.endTime).toDateString()===key).reduce((a,h)=>a+h.cost,0);
    dayTotals.push(total);
  }

  if(_chartByDevice) _chartByDevice.destroy();
  if(_chartTrend) _chartTrend.destroy();

  _chartByDevice = new Chart(byDeviceEl, {
    type:'bar',
    data:{ labels:Object.keys(byDevice), datasets:[{ label:'الإيراد (ج.م)', data:Object.values(byDevice), backgroundColor:'rgba(155,59,255,0.55)', borderColor:'#9b3bff', borderWidth:1, borderRadius:6 }] },
    options:{ plugins:{legend:{display:false}, title:{display:true, text:'الإيراد لكل جهاز', color:'#eae5ff'}}, scales:{ x:{ticks:{color:'#9c93bf'}, grid:{color:'rgba(255,255,255,0.05)'}}, y:{ticks:{color:'#9c93bf'}, grid:{color:'rgba(255,255,255,0.05)'}} } }
  });
  _chartTrend = new Chart(trendEl, {
    type:'line',
    data:{ labels:days, datasets:[{ label:'الإيراد اليومي', data:dayTotals, borderColor:'#28f0e0', backgroundColor:'rgba(40,240,224,0.15)', fill:true, tension:0.35, pointBackgroundColor:'#28f0e0' }] },
    options:{ plugins:{legend:{display:false}, title:{display:true, text:'آخر 7 أيام', color:'#eae5ff'}}, scales:{ x:{ticks:{color:'#9c93bf'}, grid:{color:'rgba(255,255,255,0.05)'}}, y:{ticks:{color:'#9c93bf'}, grid:{color:'rgba(255,255,255,0.05)'}} } }
  });
}
function openHistoryModal(){
  const rows = history.length ? history.map(h=>`
    <tr>
      <td>${h.deviceName}</td>
      <td>${new Date(h.startTime).toLocaleString('ar-EG',{hour:'2-digit',minute:'2-digit',day:'2-digit',month:'2-digit'})}</td>
      <td>${new Date(h.endTime).toLocaleString('ar-EG',{hour:'2-digit',minute:'2-digit',day:'2-digit',month:'2-digit'})}</td>
      <td>${h.mode==='multi'?'زوجي':'فردي'}</td>
      <td>${h.hours} س</td>
      <td><b style="color:var(--green)">${h.cost} ج.م</b></td>
      <td><button class="btn small danger" data-hid="${h.id}">حذف</button></td>
    </tr>
  `).join('') : `<tr><td colspan="7" class="empty">لا يوجد سجل جلسات بعد</td></tr>`;

  const totalToday = history.filter(h=>{
    const d = new Date(h.endTime); const t = new Date();
    return d.toDateString()===t.toDateString();
  }).reduce((a,h)=>a+h.cost,0);

  showModal(`
    <button class="close-x" id="mClose">✕</button>
    <h3>سجل الجلسات</h3>
    <div class="hint">إجمالي إيراد اليوم: <b style="color:var(--green)">${totalToday} ج.م</b></div>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:16px;">
      <div style="background:rgba(255,255,255,0.03); border:1px solid var(--panel-line); border-radius:10px; padding:10px;">
        <canvas id="chartByDevice" height="160"></canvas>
      </div>
      <div style="background:rgba(255,255,255,0.03); border:1px solid var(--panel-line); border-radius:10px; padding:10px;">
        <canvas id="chartTrend" height="160"></canvas>
      </div>
    </div>
    <div style="overflow-x:auto;">
      <table>
        <thead><tr><th>الجهاز</th><th>من</th><th>إلى</th><th>النوع</th><th>المدة</th><th>الحساب</th><th></th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  `, 'wide');
  document.getElementById('mClose').onclick = closeModal;
  renderHistoryCharts();
  document.querySelectorAll('[data-hid]').forEach(btn=>{
    btn.onclick = async ()=>{
      history = history.filter(h=>h.id!==btn.getAttribute('data-hid'));
      await saveHistory();
      openHistoryModal();
    };
  });
}

/* ===================== PRICES MODAL ===================== */
function openPricesModal(){
  showModal(`
    <button class="close-x" id="mClose">✕</button>
    <h3>تعديل الأسعار</h3>
    <div class="hint">أي تغيير هنا يتطبّق فورًا على كل الأجهزة وكل من يفتح الرابط</div>
    <div class="price-grid">
      <div class="field"><label>الأجهزة العادية — فردي</label><input type="number" id="pNormalSingle" value="${prices.normal.single}"></div>
      <div class="field"><label>الأجهزة العادية — زوجي</label><input type="number" id="pNormalMulti" value="${prices.normal.multi}"></div>
      <div class="field"><label>الروم — فردي</label><input type="number" id="pRoomSingle" value="${prices.room.single}"></div>
      <div class="field"><label>الروم — زوجي</label><input type="number" id="pRoomMulti" value="${prices.room.multi}"></div>
    </div>
    <div class="modal-actions">
      <button class="btn primary" id="savePricesBtn">حفظ الأسعار</button>
    </div>
  `);
  document.getElementById('mClose').onclick = closeModal;
  document.getElementById('savePricesBtn').onclick = async ()=>{
    prices.normal.single = parseFloat(document.getElementById('pNormalSingle').value||'0');
    prices.normal.multi = parseFloat(document.getElementById('pNormalMulti').value||'0');
    prices.room.single = parseFloat(document.getElementById('pRoomSingle').value||'0');
    prices.room.multi = parseFloat(document.getElementById('pRoomMulti').value||'0');
    await savePrices();
    closeModal();
    renderGrid();
    pushToast('تم تحديث الأسعار للجميع');
  };
}

/* ===================== MODAL SHELL ===================== */
function showModal(html, size){
  document.getElementById('modalRoot').innerHTML = `
    <div class="overlay" id="overlayBg">
      <div class="modal ${size==='wide'?'wide':''}">${html}</div>
    </div>
  `;
  document.getElementById('overlayBg').onclick = (e)=>{ if(e.target.id==='overlayBg') closeModal(); };
}
function closeModal(){
  document.getElementById('modalRoot').innerHTML = '';
  sessionModalDeviceId = null;
}

/* ===================== INIT ===================== */
async function init(){
  applyTheme(getSavedTheme(), false);
  renderHeader();
  if(fbInitError){
    document.getElementById('deviceGrid').innerHTML = `<div class="empty" style="grid-column:1/-1; color:var(--red);">⚠ في خطأ في إعدادات Firebase: ${fbInitError.message}</div>`;
    return;
  }
  if(firebaseConfig.apiKey === "PASTE_API_KEY_HERE"){
    document.getElementById('deviceGrid').innerHTML = `<div class="empty" style="grid-column:1/-1; color:var(--amber);">⚠ لسه محطوطش إعدادات Firebase الحقيقية بتاعتك في الكود (firebaseConfig في أول السكريبت). الموقع مش هيشتغل غير بعد ما تحطها.</div>`;
    return;
  }
  try{
    await syncServerTime();
    await loadAll();
    renderGrid();
    attachLiveListeners();
    setInterval(tick, 1000);
    setInterval(syncServerTime, 120000);
  }catch(err){
    document.getElementById('deviceGrid').innerHTML = `<div class="empty" style="grid-column:1/-1; color:var(--red);">⚠ في مشكلة في الاتصال بـ Firebase:<br>${(err && err.message) || err}<br><br>غالبًا الأسباب: بيانات firebaseConfig غلط، أو Firestore Database لسه متعملوش Create، أو الـ rules رافضة الوصول.</div>`;
    console.error(err);
  }
}
init();
</script>
